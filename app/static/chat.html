<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor - Chat</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #252540;
    --primary: #6c63ff;
    --primary-glow: rgba(108, 99, 255, 0.3);
    --text: #e0e0e0;
    --text-dim: #8888aa;
    --accent: #00d4aa;
    --danger: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* === AVATAR AREA === */
  .avatar-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    max-height: 60vh;
  }

  .avatar-container {
    position: relative;
    width: 200px;
    height: 200px;
  }

  .avatar-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid var(--surface2);
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .avatar-ring.speaking {
    border-color: var(--primary);
    box-shadow: 0 0 30px var(--primary-glow), 0 0 60px var(--primary-glow);
    animation: pulse-ring 1.5s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 20px var(--primary-glow); }
    50% { box-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(108,99,255,0.15); }
  }

  .avatar-face {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .avatar-eyes {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
  }

  .eye {
    width: 16px;
    height: 16px;
    background: var(--text);
    border-radius: 50%;
    position: relative;
    animation: blink 4s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 95%, 100% { transform: scaleY(1); }
    97% { transform: scaleY(0.1); }
  }

  .mouth {
    width: 30px;
    height: 8px;
    background: var(--primary);
    border-radius: 0 0 15px 15px;
    transition: all 0.08s ease;
  }

  .mouth.speaking {
    animation: talk 0.15s ease-in-out infinite alternate;
  }

  @keyframes talk {
    0% { height: 6px; width: 25px; border-radius: 0 0 12px 12px; }
    100% { height: 18px; width: 32px; border-radius: 0 0 16px 16px; }
  }

  .avatar-name {
    margin-top: 16px;
    font-size: 1.2em;
    font-weight: 600;
    color: var(--text);
  }

  .avatar-status {
    font-size: 0.85em;
    color: var(--text-dim);
    margin-top: 4px;
    min-height: 20px;
  }

  /* === CHAT MESSAGES === */
  .chat-area {
    width: 100%;
    max-width: 600px;
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 25vh;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.9em;
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

  .msg.user {
    align-self: flex-end;
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.8em;
    font-style: italic;
  }

  /* === INPUT AREA === */
  .input-area {
    width: 100%;
    max-width: 600px;
    padding: 12px 16px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
  }

  .text-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 24px;
    border: 1px solid var(--surface2);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95em;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--primary); }

  .btn-mic {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-mic:hover { transform: scale(1.05); }

  .btn-mic.recording {
    background: var(--danger);
    animation: pulse-rec 1s ease-in-out infinite;
  }

  @keyframes pulse-rec {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255,71,87,0); }
  }

  .btn-mic svg { width: 22px; height: 22px; }

  .btn-send {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-send:hover { transform: scale(1.05); }
  .btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-send svg { width: 20px; height: 20px; }

  /* === WAVE VISUALIZER === */
  .wave-bar {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 30px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .wave-bar.active { opacity: 1; }

  .wave-bar span {
    width: 4px;
    background: var(--primary);
    border-radius: 2px;
    transition: height 0.1s ease;
    height: 4px;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .avatar-container { width: 150px; height: 150px; }
    .avatar-face { width: 150px; height: 150px; }
    .avatar-eyes { gap: 22px; margin-bottom: 16px; }
    .eye { width: 12px; height: 12px; }
    .mouth { width: 24px; }
  }
</style>
</head>
<body>

<!-- Avatar -->
<div class="avatar-area">
  <div class="avatar-container">
    <div class="avatar-ring" id="avatarRing"></div>
    <div class="avatar-face">
      <div class="avatar-eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
      <div class="mouth" id="mouth"></div>
    </div>
  </div>
  <div class="avatar-name" id="avatarName">Emma</div>
  <div class="avatar-status" id="status">Ready to chat</div>
  <div class="wave-bar" id="waveBar"></div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg system">Say something or type below to start chatting!</div>
</div>

<!-- Input -->
<div class="input-area">
  <input type="text" class="text-input" id="textInput" placeholder="Type a message..." autocomplete="off">
  <button class="btn-mic" id="btnMic" title="Hold to record">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <button class="btn-send" id="btnSend" title="Send text" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
const API_BASE = window.location.origin;
const chatArea = document.getElementById('chatArea');
const textInput = document.getElementById('textInput');
const btnMic = document.getElementById('btnMic');
const btnSend = document.getElementById('btnSend');
const mouth = document.getElementById('mouth');
const avatarRing = document.getElementById('avatarRing');
const avatarName = document.getElementById('avatarName');
const statusEl = document.getElementById('status');
const waveBar = document.getElementById('waveBar');

// Session ID (persists in tab)
const sessionId = 'web_' + Math.random().toString(36).slice(2, 10);

let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let isProcessing = false;

// Wave bars
for (let i = 0; i < 12; i++) {
  const bar = document.createElement('span');
  waveBar.appendChild(bar);
}
const waveBars = waveBar.querySelectorAll('span');

// ============ AGENT NAME ============
async function loadAgentName() {
  try {
    const res = await fetch(`${API_BASE}/api/chat/info`);
    const data = await res.json();
    if (data.agent_name) avatarName.textContent = data.agent_name;
  } catch(e) {}
}
loadAgentName();

// ============ MESSAGES ============
function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function setStatus(text) {
  statusEl.textContent = text;
}

// ============ AUDIO PLAYBACK + AVATAR ANIMATION ============
function playAudioWithAnimation(audioBlob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(audioBlob);
    const audio = new Audio(url);

    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    const source = audioContext.createMediaElementSource(audio);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    analyser.connect(audioContext.destination);

    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    mouth.classList.add('speaking');
    avatarRing.classList.add('speaking');
    waveBar.classList.add('active');

    function animate() {
      if (audio.paused || audio.ended) {
        mouth.classList.remove('speaking');
        avatarRing.classList.remove('speaking');
        waveBar.classList.remove('active');
        mouth.style.height = '';
        mouth.style.width = '';
        URL.revokeObjectURL(url);
        resolve();
        return;
      }

      analyser.getByteFrequencyData(dataArray);

      // Mouth size based on volume
      const avg = dataArray.slice(0, 20).reduce((a, b) => a + b, 0) / 20;
      const mouthH = Math.max(6, Math.min(22, avg / 8));
      const mouthW = Math.max(24, Math.min(36, 24 + avg / 15));
      mouth.style.height = mouthH + 'px';
      mouth.style.width = mouthW + 'px';

      // Wave bars
      waveBars.forEach((bar, i) => {
        const val = dataArray[i * 4] || 0;
        bar.style.height = Math.max(3, val / 8) + 'px';
      });

      requestAnimationFrame(animate);
    }

    audio.onplay = () => requestAnimationFrame(animate);
    audio.onended = () => {
      mouth.classList.remove('speaking');
      avatarRing.classList.remove('speaking');
      waveBar.classList.remove('active');
      resolve();
    };
    audio.onerror = () => resolve();

    audio.play().catch(() => resolve());
  });
}

// ============ SEND TEXT ============
async function sendText(text) {
  if (!text.trim() || isProcessing) return;
  isProcessing = true;
  btnSend.disabled = true;
  btnMic.disabled = true;

  addMessage(text, 'user');
  textInput.value = '';
  setStatus('Thinking...');

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, session_id: sessionId }),
    });

    const data = await res.json();
    addMessage(data.text, 'assistant');

    if (data.audio_base64) {
      setStatus('Speaking...');
      const audioBytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
      const blob = new Blob([audioBytes], { type: 'audio/mp3' });
      await playAudioWithAnimation(blob);
    }

    setStatus('Ready to chat');
  } catch(e) {
    setStatus('Error — try again');
    console.error(e);
  }

  isProcessing = false;
  btnSend.disabled = !textInput.value.trim();
  btnMic.disabled = false;
}

// ============ SEND AUDIO ============
async function sendAudio(audioBlob) {
  if (isProcessing) return;
  isProcessing = true;
  btnSend.disabled = true;
  btnMic.disabled = true;

  setStatus('Transcribing...');

  try {
    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');
    formData.append('session_id', sessionId);

    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      body: formData,
    });

    const data = await res.json();

    if (data.transcription) {
      addMessage(data.transcription, 'user');
    }
    addMessage(data.text, 'assistant');

    if (data.audio_base64) {
      setStatus('Speaking...');
      const audioBytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
      const blob = new Blob([audioBytes], { type: 'audio/mp3' });
      await playAudioWithAnimation(blob);
    }

    setStatus('Ready to chat');
  } catch(e) {
    setStatus('Error — try again');
    console.error(e);
  }

  isProcessing = false;
  btnSend.disabled = !textInput.value.trim();
  btnMic.disabled = false;
}

// ============ RECORDING ============
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size > 1000) {
        sendAudio(blob);
      }
    };

    mediaRecorder.start();
    isRecording = true;
    btnMic.classList.add('recording');
    setStatus('Recording... release to send');
  } catch(e) {
    setStatus('Microphone access denied');
    console.error(e);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  isRecording = false;
  btnMic.classList.remove('recording');
}

// ============ EVENT LISTENERS ============

// Mic: press and hold
btnMic.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('mouseup', () => stopRecording());
btnMic.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

// Touch support
btnMic.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

// Text input
textInput.addEventListener('input', () => {
  btnSend.disabled = !textInput.value.trim() || isProcessing;
});

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText(textInput.value);
  }
});

btnSend.addEventListener('click', () => sendText(textInput.value));
</script>
</body>
</html>
