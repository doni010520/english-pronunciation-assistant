<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor</title>
<style>
  :root {
    --bg: #0a0a14;
    --surface: #12122a;
    --surface2: #1e1e3a;
    --primary: #6c63ff;
    --primary-glow: rgba(108, 99, 255, 0.35);
    --text: #e8e8f0;
    --text-dim: #7777aa;
    --accent: #00d4aa;
    --danger: #ff4757;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === 3D AVATAR === */
  .avatar-section {
    position: relative;
    width: 100%;
    height: 55vh;
    min-height: 300px;
    background: radial-gradient(ellipse at 50% 80%, #1a1a3e 0%, var(--bg) 70%);
  }
  #avatarCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .avatar-overlay {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
  }
  .avatar-name {
    font-size: 1.1em;
    font-weight: 600;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .avatar-status {
    font-size: 0.8em;
    color: var(--text-dim);
    margin-top: 2px;
    min-height: 18px;
  }
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 10;
    transition: opacity 0.6s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { margin-top: 12px; color: var(--text-dim); font-size: 0.9em; }

  /* === CHAT === */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  .msg {
    max-width: 82%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 0.88em;
    line-height: 1.4;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } }
  .msg.user { align-self:flex-end; background:var(--primary); color:#fff; border-bottom-right-radius:4px; }
  .msg.assistant { align-self:flex-start; background:var(--surface2); border-bottom-left-radius:4px; }
  .msg.system { align-self:center; background:none; color:var(--text-dim); font-size:0.78em; font-style:italic; }

  /* === INPUT === */
  .input-area {
    padding: 10px 14px 22px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
  }
  .text-input {
    flex:1; padding:11px 16px; border-radius:22px;
    border:1px solid var(--surface2); background:var(--bg);
    color:var(--text); font-size:0.92em; outline:none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--primary); }
  .btn {
    width:46px; height:46px; border-radius:50%; border:none;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: all 0.15s; flex-shrink:0;
  }
  .btn:active { transform: scale(0.93); }
  .btn svg { width:20px; height:20px; }
  .btn-mic { background:var(--primary); color:#fff; }
  .btn-mic.recording { background:var(--danger); animation: pulse-rec 1s ease-in-out infinite; }
  @keyframes pulse-rec {
    0%,100% { box-shadow:0 0 0 0 rgba(255,71,87,0.4); }
    50% { box-shadow:0 0 0 10px rgba(255,71,87,0); }
  }
  .btn-send { background:var(--accent); color:var(--bg); }
  .btn-send:disabled { opacity:0.35; cursor:default; }
</style>
</head>
<body>

<!-- 3D Avatar -->
<div class="avatar-section">
  <canvas id="avatarCanvas"></canvas>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading avatar...</div>
  </div>
  <div class="avatar-overlay">
    <div class="avatar-name" id="avatarName">Emma</div>
    <div class="avatar-status" id="status">Ready to chat</div>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg system">Say something or type below to start!</div>
</div>

<!-- Input -->
<div class="input-area">
  <input type="text" class="text-input" id="textInput" placeholder="Type a message..." autocomplete="off">
  <button class="btn btn-mic" id="btnMic" title="Hold to record">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <button class="btn btn-send" id="btnSend" title="Send" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<!-- Three.js + GLTFLoader -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ CONFIG ============
const API_BASE = window.location.origin;
const sessionId = 'web_' + Math.random().toString(36).slice(2, 10);

// Avatar model URLs (tries in order, first success wins)
const AVATAR_URLS = [
  // Ready Player Me default avatar with Oculus Visemes (full body)
  'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit,Oculus+Visemes&textureAtlas=none',
  // Fallback: Three.js facecap example model (face only, reliable CDN)
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r170/examples/models/gltf/facecap.glb',
];

// DOM
const canvas = document.getElementById('avatarCanvas');
const chatArea = document.getElementById('chatArea');
const textInput = document.getElementById('textInput');
const btnMic = document.getElementById('btnMic');
const btnSend = document.getElementById('btnSend');
const avatarName = document.getElementById('avatarName');
const statusEl = document.getElementById('status');
const loadingOverlay = document.getElementById('loadingOverlay');

let isRecording = false, mediaRecorder = null, audioChunks = [];
let isProcessing = false;
let audioContext = null;

// ============ THREE.JS SCENE ============
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(30, canvas.clientWidth / canvas.clientHeight, 0.01, 100);
camera.position.set(0, 0, 0.55);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
keyLight.position.set(1, 2, 2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.5);
fillLight.position.set(-1, 1, 1);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x6c63ff, 0.8);
rimLight.position.set(0, 1, -2);
scene.add(rimLight);

// Controls (limited)
const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 0, 0);
controls.enablePan = false;
controls.enableZoom = false;
controls.minPolarAngle = Math.PI / 3;
controls.maxPolarAngle = Math.PI / 2;
controls.minAzimuthAngle = -Math.PI / 6;
controls.maxAzimuthAngle = Math.PI / 6;
controls.update();

// ============ AVATAR LOADING ============
let headMesh = null;
const morphTargetMap = {};

// Viseme names from Ready Player Me (Oculus Visemes)
const VISEME_NAMES = [
  'viseme_sil', 'viseme_PP', 'viseme_FF', 'viseme_TH',
  'viseme_DD', 'viseme_kk', 'viseme_CH', 'viseme_SS',
  'viseme_nn', 'viseme_RR', 'viseme_aa', 'viseme_E',
  'viseme_I', 'viseme_O', 'viseme_U'
];

const loader = new GLTFLoader();

function loadAvatar(urls, index = 0) {
  if (index >= urls.length) {
    loadingOverlay.querySelector('.loading-text').textContent = 'Could not load avatar';
    return;
  }
  const url = urls[index];
  console.log(`Trying avatar URL ${index + 1}/${urls.length}:`, url);

  loader.load(
    url,
    (gltf) => {
      const model = gltf.scene;

      // Find mesh with morph targets
      model.traverse((child) => {
        if (child.isMesh && child.morphTargetDictionary) {
          const dict = child.morphTargetDictionary;
          if (!headMesh || Object.keys(dict).length > Object.keys(morphTargetMap).length) {
            headMesh = child;
            for (const [name, idx] of Object.entries(dict)) {
              morphTargetMap[name] = idx;
            }
          }
        }
      });

      // Auto-frame: detect model type and position camera accordingly
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const isFullBody = size.y > 0.5; // full body models are tall

      if (isFullBody) {
        // Full body: frame upper body/head area
        model.position.set(-center.x, -box.min.y, -center.z);
        scene.add(model);
        const headY = size.y * 0.85;
        controls.target.set(0, headY, 0);
        camera.position.set(0, headY, 0.65);
      } else {
        // Face only: center and scale
        const targetHeight = 0.35;
        const scale = targetHeight / size.y;
        model.scale.setScalar(scale);
        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
        model.position.sub(scaledCenter);
        model.position.y += 0.02;
        scene.add(model);
        controls.target.set(0, 0, 0);
        camera.position.set(0, 0, 0.55);
      }
      controls.update();

      console.log('Avatar loaded! Morph targets:', Object.keys(morphTargetMap).length);
      loadingOverlay.classList.add('hidden');
    },
    (progress) => {
      if (progress.total) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        loadingOverlay.querySelector('.loading-text').textContent = `Loading avatar... ${pct}%`;
      }
    },
    (error) => {
      console.warn(`Avatar URL ${index + 1} failed:`, error.message || error);
      loadAvatar(urls, index + 1); // try next URL
    }
  );
}

loadAvatar(AVATAR_URLS);

// ============ MORPH TARGET ANIMATION ============
let currentVisemes = {};
let targetVisemes = {};
let isSpeaking = false;

function setMorphTarget(name, value) {
  if (!headMesh || !(name in morphTargetMap)) return;
  headMesh.morphTargetInfluences[morphTargetMap[name]] = value;
}

function resetAllVisemes() {
  VISEME_NAMES.forEach(v => setMorphTarget(v, 0));
  setMorphTarget('mouthOpen', 0);
  setMorphTarget('jawOpen', 0);
}

// Map audio frequency bands to visemes for realistic lipsync
function updateVisemesFromAudio(dataArray) {
  if (!headMesh) return;

  // Get energy in different frequency bands
  const low = dataArray.slice(0, 8).reduce((a, b) => a + b, 0) / (8 * 255);     // vowels
  const mid = dataArray.slice(8, 24).reduce((a, b) => a + b, 0) / (16 * 255);    // consonants
  const high = dataArray.slice(24, 48).reduce((a, b) => a + b, 0) / (24 * 255);  // sibilants
  const overall = dataArray.slice(0, 32).reduce((a, b) => a + b, 0) / (32 * 255);

  // Threshold — don't animate below this
  if (overall < 0.05) {
    resetAllVisemes();
    return;
  }

  // Reset all first
  VISEME_NAMES.forEach(v => setMorphTarget(v, 0));

  // Map frequencies to viseme groups
  const jawOpen = Math.min(1, overall * 2.5);
  setMorphTarget('jawOpen', jawOpen);
  setMorphTarget('mouthOpen', jawOpen * 0.7);

  // Vowels (low frequency emphasis)
  if (low > 0.15) {
    setMorphTarget('viseme_aa', Math.min(1, low * 2.5));
    setMorphTarget('viseme_O', Math.min(1, low * 1.5));
  }

  // Mid consonants
  if (mid > 0.1) {
    setMorphTarget('viseme_DD', Math.min(1, mid * 2));
    setMorphTarget('viseme_nn', Math.min(1, mid * 1.5));
  }

  // High frequency (s, f, th)
  if (high > 0.08) {
    setMorphTarget('viseme_SS', Math.min(1, high * 3));
    setMorphTarget('viseme_FF', Math.min(1, high * 2));
  }

  // Lip closure for certain sounds
  if (mid > 0.2 && low < 0.1) {
    setMorphTarget('viseme_PP', Math.min(1, mid * 2));
  }
}

// Idle animation (subtle breathing + blinking)
let idleTime = 0;
function updateIdle(dt) {
  if (!headMesh) return;
  idleTime += dt;

  // Breathing
  const breath = Math.sin(idleTime * 1.2) * 0.02;
  if (headMesh.parent) {
    headMesh.parent.position.y = breath;
  }

  // Blinking
  const blinkCycle = idleTime % 4;
  let blinkVal = 0;
  if (blinkCycle > 3.7 && blinkCycle < 3.9) {
    blinkVal = Math.sin((blinkCycle - 3.7) / 0.2 * Math.PI);
  }
  setMorphTarget('eyeBlinkLeft', blinkVal);
  setMorphTarget('eyeBlinkRight', blinkVal);

  // Subtle smile when idle
  if (!isSpeaking) {
    setMorphTarget('mouthSmileLeft', 0.15);
    setMorphTarget('mouthSmileRight', 0.15);
  }
}

// ============ RENDER LOOP ============
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  updateIdle(dt);
  controls.update();

  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}
animate();

// ============ AUDIO PLAYBACK + LIPSYNC ============
function playAudioWithLipsync(audioBlob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(audioBlob);
    const audio = new Audio(url);

    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    const source = audioContext.createMediaElementSource(audio);
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    analyser.connect(audioContext.destination);

    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    isSpeaking = true;

    function animateLipsync() {
      if (audio.paused || audio.ended) {
        isSpeaking = false;
        resetAllVisemes();
        URL.revokeObjectURL(url);
        resolve();
        return;
      }
      analyser.getByteFrequencyData(dataArray);
      updateVisemesFromAudio(dataArray);
      requestAnimationFrame(animateLipsync);
    }

    audio.onplay = () => requestAnimationFrame(animateLipsync);
    audio.onended = () => { isSpeaking = false; resetAllVisemes(); resolve(); };
    audio.onerror = () => { isSpeaking = false; resolve(); };
    audio.play().catch(() => { isSpeaking = false; resolve(); });
  });
}

// ============ LOAD AGENT NAME ============
async function loadAgentName() {
  try {
    const res = await fetch(`${API_BASE}/api/chat/info`);
    const data = await res.json();
    if (data.agent_name) avatarName.textContent = data.agent_name;
  } catch(e) {}
}
loadAgentName();

// ============ MESSAGES ============
function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function setStatus(text) { statusEl.textContent = text; }

// ============ SEND TEXT ============
async function sendText(text) {
  if (!text.trim() || isProcessing) return;
  isProcessing = true;
  btnSend.disabled = true;
  btnMic.disabled = true;
  addMessage(text, 'user');
  textInput.value = '';
  setStatus('Thinking...');

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, session_id: sessionId }),
    });
    const data = await res.json();
    addMessage(data.text, 'assistant');

    if (data.audio_base64) {
      setStatus('Speaking...');
      const bytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
      await playAudioWithLipsync(new Blob([bytes], { type: 'audio/mp3' }));
    }
    setStatus('Ready to chat');
  } catch(e) {
    setStatus('Error — try again');
    console.error(e);
  }
  isProcessing = false;
  btnSend.disabled = !textInput.value.trim();
  btnMic.disabled = false;
}

// ============ SEND AUDIO ============
async function sendAudio(audioBlob) {
  if (isProcessing) return;
  isProcessing = true;
  btnSend.disabled = true;
  btnMic.disabled = true;
  setStatus('Transcribing...');

  try {
    const fd = new FormData();
    fd.append('audio', audioBlob, 'recording.webm');
    fd.append('session_id', sessionId);
    const res = await fetch(`${API_BASE}/api/chat`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.transcription) addMessage(data.transcription, 'user');
    addMessage(data.text, 'assistant');

    if (data.audio_base64) {
      setStatus('Speaking...');
      const bytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
      await playAudioWithLipsync(new Blob([bytes], { type: 'audio/mp3' }));
    }
    setStatus('Ready to chat');
  } catch(e) {
    setStatus('Error — try again');
    console.error(e);
  }
  isProcessing = false;
  btnSend.disabled = !textInput.value.trim();
  btnMic.disabled = false;
}

// ============ RECORDING ============
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size > 1000) sendAudio(blob);
    };
    mediaRecorder.start();
    isRecording = true;
    btnMic.classList.add('recording');
    setStatus('Recording... release to send');
  } catch(e) {
    setStatus('Microphone access denied');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  isRecording = false;
  btnMic.classList.remove('recording');
}

// ============ EVENTS ============
btnMic.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('mouseup', stopRecording);
btnMic.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
btnMic.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

textInput.addEventListener('input', () => { btnSend.disabled = !textInput.value.trim() || isProcessing; });
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(textInput.value); }
});
btnSend.addEventListener('click', () => sendText(textInput.value));
</script>
</body>
</html>
