<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; display: flex; justify-content: center; padding: 32px; }
  .card {
    width: 1080px; height: 1080px;
    background: linear-gradient(150deg, #450a0a 0%, #1e1b4b 100%);
    border-radius: 24px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start; text-align: left;
    padding: 80px 96px;
  }
  .tag {
    background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4);
    color: #ef4444; padding: 8px 20px; border-radius: 8px;
    font-size: 22px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 40px;
  }
  h1 {
    font-size: 68px; font-weight: 900; color: #fff; line-height: 1.15;
    margin-bottom: 36px;
  }
  h1 em { font-style: normal; color: #ef4444; }
  .body-text {
    font-size: 32px; color: rgba(255,255,255,0.7); line-height: 1.7;
    max-width: 800px; margin-bottom: 48px;
  }
  .body-text strong { color: #fff; }
  .divider {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #ef4444, #818cf8);
    border-radius: 2px; margin-bottom: 40px;
  }
  .solution {
    font-size: 36px; font-weight: 800; color: #22c55e; line-height: 1.4;
  }
</style>
</head>
<body>
<div class="card">
  <div class="tag">Alerta para escolas de idiomas</div>
  <h1>Seu aluno ja usa<br><em>ChatGPT</em> pra<br>praticar ingles</h1>
  <div class="body-text">
    Ele conversa, tira duvidas e pratica <strong>de graca</strong>.<br>
    Um dia ele pensa: <strong>"pra que pagar escola?"</strong>
  </div>
  <div class="divider"></div>
  <div class="solution">A menos que SUA escola<br>ofereça IA primeiro.</div>
</div>
</body>
</html>
